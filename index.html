<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaby</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #2b1020);
      color: white;
      text-align: center;
    }

    header {
      padding: 28px 16px 12px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    p {
      margin: 10px auto 0;
      max-width: 600px;
      color: #f5d7e6;
      font-size: 16px;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 18px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .galeria img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
      background: #222;
    }
  </style>
</head>
<body>
  <header>
    <h1>Fotos da Gaby</h1>
    <p>Uma galeria especial com as fotos guardadas neste site.</p>
  </header>

  <main class="galeria" id="galeria"></main>

  <script>
    const galeria = document.getElementById('galeria');

    for (let i = 1; i <= 62; i++) {
      const img = document.createElement('img');
      img.src = `IMG/img${i}.png`;
      img.alt = `Foto ${i}`;
      img.loading = 'lazy';
      galeria.appendChild(img);
    }
  </script>
</body>
</html>
