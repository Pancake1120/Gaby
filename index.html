<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaby</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #ffb3d1 0, #2b1020 45%, #08070a 100%);
      color: white;
      overflow-x: hidden;
    }
    .hero {
      min-height: 42vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 44px 18px 26px;
      position: relative;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 28px;
      pointer-events: none;
    }
    .hero-content {
      max-width: 760px;
      padding: 24px;
      border-radius: 26px;
      background: rgba(255, 255, 255, .08);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0;
      font-size: clamp(38px, 10vw, 82px);
      letter-spacing: 1px;
      text-shadow: 0 8px 28px rgba(0,0,0,.45);
    }
    .subtitle {
      margin: 14px auto 0;
      max-width: 560px;
      font-size: clamp(16px, 4vw, 21px);
      color: #ffe6f1;
      line-height: 1.5;
    }
    .counter {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      color: #fff;
      font-weight: bold;
    }
    .galeria {
      columns: 4 180px;
      column-gap: 16px;
      padding: 18px;
      max-width: 1180px;
      margin: 0 auto 34px;
    }
    .photo-card {
      break-inside: avoid;
      margin: 0 0 16px;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,.08);
      box-shadow: 0 12px 34px rgba(0,0,0,.32);
      transform: translateZ(0);
    }
    .photo-card img {
      display: block;
      width: 100%;
      height: auto;
    }
    footer {
      text-align: center;
      padding: 22px 14px 34px;
      color: #ffd7e8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <h1>Gaby</h1>
      <p class="subtitle">Uma galeria feita com carinho, reunindo momentos especiais em um cantinho só.</p>
      <span class="counter">60 fotos</span>
    </div>
  </section>

  <main class="galeria" id="galeria"></main>

  <footer>Feito com carinho 💗</footer>

  <script>
    const fotos = [
      'IMG/img1.jpg',
      'IMG/img2.jpg',
      'IMG/img3.png',
      'IMG/img4.jpg',
      'IMG/img5.jpg',
      'IMG/img6.jpg',
      'IMG/img7.jpg',
      'IMG/img8.jpg',
      'IMG/img9.jpg',
      'IMG/img10.jpg',
      'IMG/img11.jpg',
      'IMG/img12.jpg',
      'IMG/img13.jpg',
      'IMG/img14.jpg',
      'IMG/img15.jpg',
      'IMG/img16.jpg',
      'IMG/img17.jpg',
      'IMG/img18.jpg',
      'IMG/img19.jpg',

      'IMG/img58.jpg',
      'IMG/img59.jpg',
      'IMG/img60.jpg'
    ];

    const galeria = document.getElementById('galeria');

    fotos.forEach((foto, index) => {
      const card = document.createElement('div');
      card.className = 'photo-card';

      const img = document.createElement('img');
      img.src = foto;
      img.alt = `Foto ${index + 1}`;
      img.loading = 'lazy';

      card.appendChild(img);
      galeria.appendChild(card);
    });
  </script>
</body>
</html>
