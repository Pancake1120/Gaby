<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Galeria</title>
  <style>
    body {
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 5px;
      background: black;
      padding: 5px;
    }
    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<script>
for (let i = 1; i <= 62; i++) {
  document.write(`<img src="img/img${i}.png">`);
}
</script>

</body>
</html>
